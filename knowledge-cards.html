<script>
const GRADIENTS = 8;
const TAG_GRADIENTS = 4;
const STORAGE_KEY = 'kc_user_state';

// ── Data ──
const EMBEDDED = JSON.parse(document.getElementById('cardData').textContent);

function userState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}
function saveState(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }

function allCards() {
  const s = userState();
  return EMBEDDED.filter(c => !(s.hidden || {})[c.id]);
}
function isStarred(id) { return !!(userState().starred || {})[id]; }
function toggleStar(id) {
  const s = userState();
  s.starred = s.starred || {};
  s.starred[id] = !s.starred[id];
  saveState(s);
  render();
  toast(s.starred[id] ? '⭐ 已标记为重点关注' : '已取消重点关注');
}
function hideCard(id) {
  const s = userState();
  s.hidden = s.hidden || {};
  s.hidden[id] = true;
  saveState(s);
  document.querySelector('.overlay')?.remove();
  render();
  toast('🗑️ 已隐藏（刷新后生效，下次更新会重新出现）');
}
function showAllHidden() {
  const s = userState();
  s.hidden = {};
  saveState(s);
  render();
  toast('✅ 已恢复全部隐藏卡片');
}

// ── Render ──
let currentFilter = 'all';

function getAllTags() {
  const set = new Set();
  allCards().forEach(c => c.tags.forEach(t => set.add(t)));
  return [...set].sort();
}

function getFiltered() {
  const search = document.getElementById('searchInput').value.toLowerCase().trim();
  const cards = allCards();
  return cards.filter(c => {
    if (currentFilter === 'starred' && !isStarred(c.id)) return false;
    if (currentFilter !== 'all' && currentFilter !== 'starred' && !c.tags.includes(currentFilter)) return false;
    if (search) {
      const h = (c.name + ' ' + c.excerpt + ' ' + c.tags.join(' ')).toLowerCase();
      if (!h.includes(search)) return false;
    }
    return true;
  });
}

function setFilter(tag) { currentFilter = tag; render(); }

function render() {
  const grid = document.getElementById('cardGrid');
  const filtered = getFiltered();
  const s = userState();
  const hiddenCount = Object.keys(s.hidden || {}).filter(k => s.hidden[k]).length;

  document.getElementById('resultCount').textContent =
    `共 ${filtered.length} 条` + (hiddenCount > 0 ? ` | ${hiddenCount} 条已隐藏` : '');
  document.getElementById('updateTime').textContent =
    `最后更新 ${EMBEDDED[0]?.updatedAt || ''}`;

  if (filtered.length === 0) {
    const hasHidden = EMBEDDED.length > 0 && allCards().length === 0;
    const hasSearch = document.getElementById('searchInput').value.trim() || currentFilter !== 'all';
    grid.innerHTML = hasHidden && !hasSearch
      ? `<div class="empty-state"><div class="emoji">🫥</div><p>所有卡片都已隐藏</p><p style="font-size:0.9rem;margin-top:8px"><a href="#" style="color:#667eea;cursor:pointer" onclick="showAllHidden();return false">点击恢复全部</a></p></div>`
      : `<div class="empty-state"><div class="emoji">📭</div><p>没有找到匹配的资料</p></div>`;
    // tags
    const tc = document.getElementById('filterTags');
    tc.innerHTML = `<button class="filter-tag${currentFilter==='all'?' active':''}" onclick="setFilter('all')">全部</button>` + (EMBEDDED.length === 0 ? '' : `<button class="filter-tag${currentFilter==='starred'?' active':''}" style="color:#e67e22;border-color:#f6d365" onclick="setFilter('starred')">⭐ 重点</button>`);
    return;
  }

  // tag buttons
  const tc = document.getElementById('filterTags');
  const tags = getAllTags();
  tc.innerHTML = `<button class="filter-tag${currentFilter==='all'?' active':''}" onclick="setFilter('all')">全部</button>` +
    `<button class="filter-tag${currentFilter==='starred'?' active':''}" style="color:#e67e22;border-color:#f6d365;${currentFilter==='starred'?'background:var(--star-gold);color:#fff;border-color:transparent':''}" onclick="setFilter('starred')">⭐ 重点</button>` +
    tags.map(t => `<button class="filter-tag${currentFilter===t?' active':''}" onclick="setFilter('${t.replace(/'/g,"&#39;")}')">${esc(t)}</button>`).join('');

  grid.innerHTML = filtered.map(c => {
    const g = 'g' + (c.gradient % GRADIENTS);
    const tb = c.gradient % TAG_GRADIENTS;
    const star = isStarred(c.id);
    return `<div class="card${star?' starred':''}" onclick="openDetail('${c.id}')">
      <div class="card-bar ${g}"></div>
      <div class="card-body">
        <div class="card-title">
          <span class="star-icon${star?' active':''}" onclick="event.stopPropagation();toggleStar('${c.id}')">${star?'⭐':'☆'}</span>
          ${esc(c.name)}
        </div>
        <div class="card-desc">${esc(c.excerpt)}</div>
        ${c.tags.length ? `<div class="card-tags">${c.tags.map((t,i) => `<span class="tag t${(tb+i)%TAG_GRADIENTS}">${esc(t)}</span>`).join('')}</div>` : ''}
      </div>
      <div class="card-footer"><span>${c.updatedAt}</span>${star ? '<span style="color:#f6ad55">⭐ 重点关注</span>' : ''}</div>
    </div>`;
  }).join('');
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ── Detail ──
function openDetail(id) {
  const card = EMBEDDED.find(c => c.id === id);
  if (!card) return;
  const g = 'g' + (card.gradient % GRADIENTS);
  const star = isStarred(id);

  const ov = document.createElement('div');
  ov.className = 'overlay';
  ov.onclick = e => { if (e.target === ov) ov.remove(); };

  ov.innerHTML = `<div class="detail-panel" onclick="event.stopPropagation()">
    <div class="detail-header ${g}">
      <div style="display:flex;align-items:center;gap:10px">
        <h2>${star?'⭐ ':''}${esc(card.name)}</h2>
        <span style="font-size:1.2rem;cursor:pointer;opacity:0.7;transition:opacity 0.2s" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.7'" onclick="toggleStar('${id}')" title="${star?'取消':'标记'}重点关注">${star?'🌟':'☆'}</span>
      </div>
      <div class="detail-meta">
        ${card.tags.map(t => `<span style="background:rgba(255,255,255,0.25);padding:2px 10px;border-radius:50px;">${esc(t)}</span>`).join(' ')}
      </div>
      ${card.sourceUrl ? `<div class="detail-meta" style="margin-top:6px;"><a href="${card.sourceUrl}" target="_blank" rel="noopener">🔗 打开原文链接</a></div>` : ''}
      <div class="detail-meta" style="margin-top:4px;opacity:0.7">
        <span>📅 ${card.updatedAt}</span>
      </div>
    </div>
    <div class="detail-body">${marked.parse(card.detail)}</div>
  </div>`;
  document.body.appendChild(ov);
}

function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2600);
}

render();
</script>

</body>
</html>
